name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          mkdir -p dist/EDChatOverlay
          cp load.py chat_overlay.py deepl_client.py README.md dist/EDChatOverlay/
          cd dist
          zip -r "EDChatOverlay-${{ github.ref_name }}.zip" EDChatOverlay

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "dist/EDChatOverlay-${{ github.ref_name }}.zip" \
            --title "${{ github.ref_name }}" \
            --generate-notes
